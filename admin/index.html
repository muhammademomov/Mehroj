<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — GlowUp Rentals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--rose:#C8536A;--rose-dark:#9E3A50;--rose-pale:#FDF0F2;--rose-light:#F2C4CE;--blush:#FAE6EB;--dark:#1A1118;--gray:#6B5B62;--gray-l:#D6C8CC;--white:#FFFFFF;--off:#FBF7F8;--green:#2E7D52;--red:#C0392B;--font-d:'Playfair Display',serif;--font-b:'Inter',sans-serif}
    body{font-family:var(--font-b);background:var(--off);color:var(--dark)}
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--rose-pale),var(--blush))}
    .login-box{background:white;border-radius:20px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(200,83,106,0.15);text-align:center}
    .login-logo{width:56px;height:56px;border-radius:50%;margin:0 auto 1.2rem;background:linear-gradient(135deg,var(--rose),var(--rose-dark));display:flex;align-items:center;justify-content:center;color:white;font-size:24px;font-family:var(--font-d);font-weight:700}
    .login-box h2{font-family:var(--font-d);margin-bottom:6px}
    .login-box p{font-size:14px;color:var(--gray);margin-bottom:1.8rem}
    .login-box input{width:100%;padding:12px 14px;border:1.5px solid var(--gray-l);border-radius:10px;font-size:15px;font-family:var(--font-b);margin-bottom:12px;outline:none;transition:border-color 0.2s}
    .login-box input:focus{border-color:var(--rose)}
    .login-btn{width:100%;padding:13px;background:var(--rose);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:background 0.2s}
    .login-btn:hover{background:var(--rose-dark)}
    .login-error{color:var(--red);font-size:13px;margin-top:8px;display:none}
    #admin-screen{display:none;min-height:100vh}
    .admin-header{position:sticky;top:0;z-index:100;background:white;border-bottom:1px solid var(--rose-light);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(200,83,106,0.08)}
    .admin-brand{font-family:var(--font-d);font-weight:700;font-size:1.2rem;color:var(--dark);display:flex;align-items:center;gap:10px}
    .admin-brand-dot{width:10px;height:10px;border-radius:50%;background:var(--rose)}
    .admin-actions{display:flex;gap:10px;align-items:center}
    .btn-sm{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font-b);transition:all 0.2s}
    .btn-save{background:var(--rose);color:white}
    .btn-save:hover{background:var(--rose-dark)}
    .btn-preview{background:var(--off);color:var(--dark);border:1px solid var(--gray-l)}
    .btn-logout{background:none;color:var(--gray);border:1px solid var(--gray-l)}
    .save-status{font-size:13px;color:var(--green);display:none}
    .admin-body{display:flex;min-height:calc(100vh - 60px)}
    .admin-sidebar{width:220px;flex-shrink:0;background:white;border-right:1px solid var(--rose-light);padding:1.5rem 0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
    .sidebar-section{padding:0 1rem 1rem}
    .sidebar-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);padding:0 4px 6px}
    .sidebar-link{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--dark);cursor:pointer;transition:all 0.15s;border:none;background:none;width:100%;text-align:left}
    .sidebar-link:hover{background:var(--rose-pale);color:var(--rose)}
    .sidebar-link.active{background:var(--rose-pale);color:var(--rose);font-weight:600}
    .admin-main{flex:1;padding:2rem;overflow-x:hidden}
    .admin-tab{display:none}
    .admin-tab.active{display:block}
    .tab-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
    .tab-title{font-family:var(--font-d);font-size:1.6rem;font-weight:700}
    .tab-sub{font-size:14px;color:var(--gray);margin-top:2px}
    .btn-add{padding:9px 20px;background:var(--rose);color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:background 0.2s;display:flex;align-items:center;gap:6px}
    .btn-add:hover{background:var(--rose-dark)}
    .items-list{display:flex;flex-direction:column;gap:12px}
    .item-card{background:white;border-radius:14px;border:1px solid var(--gray-l);padding:1.25rem 1.5rem;transition:box-shadow 0.2s}
    .item-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.07)}
    .item-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0}
    .item-card-title{font-weight:600;font-size:15px;color:var(--dark)}
    .item-card-price{font-family:var(--font-d);font-size:1.3rem;color:var(--rose);font-weight:700}
    .item-card-actions{display:flex;gap:8px}
    .btn-edit,.btn-del{padding:6px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font-b);transition:all 0.2s}
    .btn-edit{background:var(--rose-pale);color:var(--rose)}
    .btn-edit:hover{background:var(--rose-light)}
    .btn-del{background:#FDECEA;color:var(--red)}
    .btn-del:hover{background:#FBBABA}
    .highlight-badge{font-size:11px;padding:3px 10px;border-radius:50px;background:var(--rose);color:white;font-weight:700;margin-left:8px}
    .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .field-group{display:flex;flex-direction:column;gap:5px}
    .field-group.full{grid-column:1/-1}
    .field-group label{font-size:12px;font-weight:600;color:var(--gray)}
    .field-group input,.field-group select,.field-group textarea{padding:9px 12px;border:1.5px solid var(--gray-l);border-radius:8px;font-size:14px;font-family:var(--font-b);color:var(--dark);transition:border-color 0.2s;outline:none;background:var(--off)}
    .field-group input:focus,.field-group select:focus,.field-group textarea:focus{border-color:var(--rose);background:white}
    .field-group textarea{resize:vertical;min-height:80px}
    .checkbox-row{display:flex;align-items:center;gap:8px;margin-top:4px}
    .checkbox-row input[type="checkbox"]{width:16px;height:16px;accent-color:var(--rose)}
    .modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(26,17,24,0.55);backdrop-filter:blur(4px);align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:white;border-radius:20px;padding:2rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
    .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
    .modal-title{font-family:var(--font-d);font-size:1.3rem;font-weight:700}
    .modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--gray);padding:4px 8px;border-radius:6px}
    .modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:1.5rem}
    .btn-cancel{padding:9px 20px;background:var(--off);color:var(--dark);border:1px solid var(--gray-l);border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;font-family:var(--font-b)}
    .btn-confirm{padding:9px 22px;background:var(--rose);color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;font-family:var(--font-b)}
    .btn-confirm:hover{background:var(--rose-dark)}
    .branding-form{background:white;border-radius:14px;border:1px solid var(--gray-l);padding:1.5rem}
    .includes-editor{display:flex;flex-direction:column;gap:6px}
    .include-row{display:flex;gap:6px}
    .include-row input{flex:1;padding:8px 10px;border:1.5px solid var(--gray-l);border-radius:7px;font-size:13px;font-family:var(--font-b);outline:none}
    .include-row input:focus{border-color:var(--rose)}
    .btn-remove-inc{padding:6px 10px;background:#FDECEA;color:var(--red);border:none;border-radius:7px;cursor:pointer;font-size:14px;font-weight:700}
    .btn-add-inc{padding:7px 14px;background:var(--rose-pale);color:var(--rose);border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;font-family:var(--font-b)}
    @media(max-width:700px){.admin-sidebar{display:none}.admin-main{padding:1rem}.field-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">A</div>
    <h2>Admin Panel</h2>
    <p>GlowUp Rentals — Manage your site</p>
    <input type="text" id="login-user" placeholder="Username">
    <input type="password" id="login-pass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <p class="login-error" id="login-error">Incorrect username or password</p>
    <p style="font-size:12px;color:var(--gray);margin-top:16px;">Default: admin / admin123</p>
  </div>
</div>

<div id="admin-screen">
  <header class="admin-header">
    <div class="admin-brand"><div class="admin-brand-dot"></div>Admin Panel</div>
    <div class="admin-actions">
      <span class="save-status" id="save-status">✓ Saved!</span>
      <button class="btn-sm btn-preview" onclick="window.open('../index.html','_blank')">Preview Site ↗</button>
      <button class="btn-sm btn-save" onclick="saveAllData()">Save Changes</button>
      <button class="btn-sm btn-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </header>
  <div class="admin-body">
    <aside class="admin-sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Site Content</div>
        <button class="sidebar-link active" onclick="showTab('branding',this)">🏷 Branding</button>
        <button class="sidebar-link" onclick="showTab('prices',this)">💲 Individual Prices</button>
        <button class="sidebar-link" onclick="showTab('packages',this)">📦 Packages</button>
        <button class="sidebar-link" onclick="showTab('reviews',this)">⭐ Reviews</button>
        <button class="sidebar-link" onclick="showTab('faq',this)">❓ FAQ</button>
      </div>
    </aside>
    <main class="admin-main">

      <div class="admin-tab active" id="tab-branding">
        <div class="tab-header"><div><div class="tab-title">Branding & Contact</div><div class="tab-sub">Site name, phone, address</div></div></div>
        <div class="branding-form">
          <div class="field-grid">
            <div class="field-group"><label>Site Name</label><input id="b-name"></div>
            <div class="field-group"><label>Phone</label><input id="b-phone"></div>
            <div class="field-group"><label>Email</label><input id="b-email"></div>
            <div class="field-group"><label>Address</label><input id="b-address"></div>
            <div class="field-group"><label>Instagram URL</label><input id="b-insta"></div>
            <div class="field-group full"><label>Service Areas</label><input id="b-areas"></div>
          </div>
          <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--gray-l)">
            <div style="font-size:13px;font-weight:600;color:var(--gray);margin-bottom:10px">Login Credentials</div>
            <div class="field-grid">
              <div class="field-group"><label>Username</label><input id="b-user"></div>
              <div class="field-group"><label>Password</label><input type="password" id="b-pass"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="admin-tab" id="tab-prices">
        <div class="tab-header"><div><div class="tab-title">Individual Prices</div></div><button class="btn-add" onclick="openAddModal('price')">+ Add Item</button></div>
        <div class="items-list" id="prices-list"></div>
      </div>

      <div class="admin-tab" id="tab-packages">
        <div class="tab-header"><div><div class="tab-title">Packages</div></div><button class="btn-add" onclick="openAddModal('package')">+ Add Package</button></div>
        <div class="items-list" id="packages-list"></div>
      </div>

      <div class="admin-tab" id="tab-reviews">
        <div class="tab-header"><div><div class="tab-title">Reviews</div></div><button class="btn-add" onclick="openAddModal('review')">+ Add Review</button></div>
        <div class="items-list" id="reviews-list"></div>
      </div>

      <div class="admin-tab" id="tab-faq">
        <div class="tab-header"><div><div class="tab-title">FAQ</div></div><button class="btn-add" onclick="openAddModal('faq')">+ Add Question</button></div>
        <div class="items-list" id="faq-list"></div>
      </div>

    </main>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Edit</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmModal()">Save</button>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script>
const ADMIN_KEY='glowup_admin_creds';
function getCreds(){try{return JSON.parse(localStorage.getItem(ADMIN_KEY))||{user:'admin',pass:'admin123'}}catch{return{user:'admin',pass:'admin123'}}}
function doLogin(){const u=document.getElementById('login-user').value.trim(),p=document.getElementById('login-pass').value.trim(),c=getCreds();if(u===c.user&&p===c.pass){document.getElementById('login-screen').style.display='none';document.getElementById('admin-screen').style.display='block';loadAdminData()}else{document.getElementById('login-error').style.display='block'}}
function doLogout(){document.getElementById('admin-screen').style.display='none';document.getElementById('login-screen').style.display='flex'}
let adminData=null;
function loadAdminData(){const s=localStorage.getItem('glowup_site_data');adminData=s?JSON.parse(s):JSON.parse(JSON.stringify(SITE_DATA));populateBranding();renderPricesList();renderPackagesList();renderReviewsList();renderFAQList()}
function saveAllData(){adminData.name=document.getElementById('b-name').value;adminData.phone=document.getElementById('b-phone').value;adminData.email=document.getElementById('b-email').value;adminData.address=document.getElementById('b-address').value;adminData.instagram=document.getElementById('b-insta').value;adminData.areas=document.getElementById('b-areas').value;const u=document.getElementById('b-user').value.trim(),p=document.getElementById('b-pass').value.trim();if(u&&p)localStorage.setItem(ADMIN_KEY,JSON.stringify({user:u,pass:p}));localStorage.setItem('glowup_site_data',JSON.stringify(adminData));const s=document.getElementById('save-status');s.style.display='inline';setTimeout(()=>s.style.display='none',2500)}
function populateBranding(){document.getElementById('b-name').value=adminData.name||'';document.getElementById('b-phone').value=adminData.phone||'';document.getElementById('b-email').value=adminData.email||'';document.getElementById('b-address').value=adminData.address||'';document.getElementById('b-insta').value=adminData.instagram||'';document.getElementById('b-areas').value=adminData.areas||'';const c=getCreds();document.getElementById('b-user').value=c.user;document.getElementById('b-pass').value=c.pass}
function showTab(name,btn){document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active'));document.getElementById('tab-'+name).classList.add('active');btn.classList.add('active')}
function renderPricesList(){const l=document.getElementById('prices-list');l.innerHTML=adminData.individualPrices.map((p,i)=>`<div class="item-card"><div class="item-card-header"><div><div class="item-card-title">${p.title}</div><div style="font-size:13px;color:var(--gray)">${p.note||''}</div></div><div style="display:flex;align-items:center;gap:12px"><div class="item-card-price">${p.price} <span style="font-size:14px;font-family:var(--font-b);color:var(--gray)">/ ${p.unit}</span></div><div class="item-card-actions"><button class="btn-edit" onclick="openEditModal('price',${i})">Edit</button><button class="btn-del" onclick="deleteItem('individualPrices',${i})">Delete</button></div></div></div></div>`).join('')}
function renderPackagesList(){const l=document.getElementById('packages-list');l.innerHTML=adminData.packages.map((p,i)=>`<div class="item-card"><div class="item-card-header"><div><div class="item-card-title">${p.name}${p.highlight?`<span class="highlight-badge">${p.tag||'Featured'}</span>`:''}</div><div style="font-size:13px;color:var(--gray);margin-top:4px">${p.includes.join(' · ')}</div></div><div style="display:flex;align-items:center;gap:12px"><div class="item-card-price">${p.price}</div><div class="item-card-actions"><button class="btn-edit" onclick="openEditModal('package',${i})">Edit</button><button class="btn-del" onclick="deleteItem('packages',${i})">Delete</button></div></div></div></div>`).join('')}
function renderReviewsList(){const l=document.getElementById('reviews-list');l.innerHTML=adminData.reviews.map((r,i)=>`<div class="item-card"><div class="item-card-header"><div><div class="item-card-title">${'★'.repeat(r.stars)} ${r.name} — ${r.event}</div><div style="font-size:13px;color:var(--gray);margin-top:4px;font-style:italic">"${r.text.substring(0,100)}..."</div></div><div class="item-card-actions"><button class="btn-edit" onclick="openEditModal('review',${i})">Edit</button><button class="btn-del" onclick="deleteItem('reviews',${i})">Delete</button></div></div></div>`).join('')}
function renderFAQList(){const l=document.getElementById('faq-list');l.innerHTML=adminData.faq.map((f,i)=>`<div class="item-card"><div class="item-card-header"><div style="flex:1;margin-right:12px"><div class="item-card-title">Q: ${f.question}</div><div style="font-size:13px;color:var(--gray);margin-top:4px">A: ${f.answer.substring(0,100)}...</div></div><div class="item-card-actions"><button class="btn-edit" onclick="openEditModal('faq',${i})">Edit</button><button class="btn-del" onclick="deleteItem('faq',${i})">Delete</button></div></div></div>`).join('')}
function deleteItem(col,idx){if(!confirm('Delete?'))return;adminData[col].splice(idx,1);refreshList(col)}
function refreshList(col){if(col==='individualPrices')renderPricesList();else if(col==='packages')renderPackagesList();else if(col==='reviews')renderReviewsList();else if(col==='faq')renderFAQList()}
let currentModal={type:null,index:null};
function openAddModal(type){currentModal={type,index:null};document.getElementById('modal-title').textContent='Add '+capitalize(type);document.getElementById('modal-body').innerHTML=buildForm(type,null);document.getElementById('modal-overlay').classList.add('open')}
function openEditModal(type,index){currentModal={type,index};document.getElementById('modal-title').textContent='Edit '+capitalize(type);const item=getItem(type,index);document.getElementById('modal-body').innerHTML=buildForm(type,item);document.getElementById('modal-overlay').classList.add('open')}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open')}
function confirmModal(){const{type,index}=currentModal;const item=readForm(type);if(!item)return;const col=getCollection(type);if(index===null){item.id=type+Date.now();adminData[col].push(item)}else{item.id=adminData[col][index].id;adminData[col][index]=item}refreshList(col);closeModal()}
function getCollection(type){return{price:'individualPrices',package:'packages',review:'reviews',faq:'faq'}[type]}
function getItem(type,index){return adminData[getCollection(type)][index]}
function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1)}
function buildForm(type,item){
  if(type==='price')return`<div class="field-grid"><div class="field-group full"><label>Title</label><input id="f-title" value="${item?.title||''}"></div><div class="field-group"><label>Price (e.g. $75)</label><input id="f-price" value="${item?.price||''}"></div><div class="field-group"><label>Unit (e.g. per letter)</label><input id="f-unit" value="${item?.unit||''}"></div><div class="field-group full"><label>Note (optional)</label><input id="f-note" value="${item?.note||''}"></div></div>`;
  if(type==='package'){const inc=item?.includes||[''];return`<div class="field-grid"><div class="field-group full"><label>Package Name</label><input id="f-name" value="${item?.name||''}"></div><div class="field-group"><label>Price</label><input id="f-price" value="${item?.price||''}"></div><div class="field-group"><label>Tag (e.g. Most Popular)</label><input id="f-tag" value="${item?.tag||''}"></div><div class="field-group full"><label>What's Included</label><div class="includes-editor" id="includes-editor">${inc.map(i=>`<div class="include-row"><input value="${i}" placeholder="Item..."><button class="btn-remove-inc" onclick="removeInclude(this)">×</button></div>`).join('')}</div><button class="btn-add-inc" onclick="addInclude()">+ Add Item</button></div><div class="field-group full"><label>Note</label><input id="f-note" value="${item?.note||''}"></div><div class="field-group full"><div class="checkbox-row"><input type="checkbox" id="f-highlight" ${item?.highlight?'checked':''}><label for="f-highlight">Mark as featured</label></div></div></div>`}
  if(type==='review')return`<div class="field-grid"><div class="field-group"><label>Client Name</label><input id="f-name" value="${item?.name||''}"></div><div class="field-group"><label>Event Type</label><input id="f-event" value="${item?.event||''}"></div><div class="field-group full"><label>Review Text</label><textarea id="f-text" style="min-height:120px">${item?.text||''}</textarea></div><div class="field-group"><label>Stars</label><select id="f-stars">${[5,4,3,2,1].map(n=>`<option value="${n}" ${item?.stars===n?'selected':''}>${n} ★</option>`).join('')}</select></div></div>`;
  if(type==='faq')return`<div class="field-grid"><div class="field-group full"><label>Question</label><input id="f-question" value="${item?.question||''}"></div><div class="field-group full"><label>Answer</label><textarea id="f-answer" style="min-height:120px">${item?.answer||''}</textarea></div></div>`;
}
function addInclude(){const ed=document.getElementById('includes-editor');const d=document.createElement('div');d.className='include-row';d.innerHTML='<input placeholder="Item..."><button class="btn-remove-inc" onclick="removeInclude(this)">×</button>';ed.appendChild(d)}
function removeInclude(btn){const ed=document.getElementById('includes-editor');if(ed.children.length>1)btn.parentElement.remove()}
function readForm(type){const g=id=>{const el=document.getElementById(id);return el?el.value.trim():''};
  if(type==='price')return{title:g('f-title'),price:g('f-price'),unit:g('f-unit'),note:g('f-note')};
  if(type==='package'){const rows=document.querySelectorAll('#includes-editor .include-row input');const includes=[...rows].map(r=>r.value.trim()).filter(Boolean);return{name:g('f-name'),price:g('f-price'),tag:g('f-tag'),includes,note:g('f-note'),highlight:document.getElementById('f-highlight').checked}}
  if(type==='review')return{name:g('f-name'),event:g('f-event'),text:g('f-text'),stars:parseInt(document.getElementById('f-stars').value)};
  if(type==='faq')return{question:g('f-question'),answer:g('f-answer')};
}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
</script>
</body>
</html>
